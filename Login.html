<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="registroEstilo.css" />
</head>

<body>

  <div class="scene">
    <div class="card">

      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="logo"></div>

      <div class="sub">Bienvenido</div>

      <div class="divider"></div>

      <form action="login.php" method="POST">

        <div class="field">
          <label class="lb">Correo electrónico</label>
          <input 
            type="email" 
            name="email" 
            placeholder="Correo electrónico" 
            required
          />
        </div>

        <div class="field">
          <label class="lp">Contraseña</label>
          <input 
            type="password" 
            name="password" 
            placeholder="••••••••••"
            required
          />
        </div>

        <div class="row">
          <label class="check-wrap">
            <input type="checkbox" name="recordarme"/> Recordarme
          </label>

          <a class="olvidar" href="#">
            ¿Olvidaste?
          </a>
        </div>

        <button type="submit" class="btn">
          Acceder
        </button>

      </form>

      <div class="register">
        ¿No tienes cuenta?
        <a href="registro.html">Regístrate</a>
      </div>

    </div>
  </div>

</body>
</html>
