<!DOCTYPE html>
<html lang="es">
<head>

<title>Registrarse</title>

</head>
<body>
<div class="container">
<h1>Registro</h1>
<form action="registro.php" method="POST">
<label>Nombres y Apellidos:</label>
<input type="text" name="nombre_cliente" required>

<label>Correo Electronico:</label>

</form>
</div>
